server.port=${PORT:8080}
spring.application.name=job-portal

# Database — uses environment variables (Render or local)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/job_portal}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# Fix for "prepared statement already exists" error in PostgreSQL/PgBouncer
spring.datasource.hikari.dataSourceProperties.prepareThreshold=0


# Supabase Storage Configuration
supabase.project-url=${SUPABASE_URL}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}

# Multipart file upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.open-in-view=false

# Brevo SMTP — uses environment variables
spring.mail.host=${MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:your-brevo-email@example.com}
spring.mail.password=${MAIL_PASSWORD:your-brevo-smtp-key}
spring.mail.properties.mail.smtp.auth=${MAIL_AUTH:true}
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false

# JWT Secret — MUST be set in production
app.jwt.secret=${JWT_SECRET}
OPENAI_API_KEY=${OPENAI_API_KEY}