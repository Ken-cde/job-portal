server.port=${PORT:8080}
spring.application.name=job-portal

# Database — auto-detect: uses PostgreSQL on Render, MySQL locally
spring.datasource.url=${DATABASE_URL:${MYSQL_URL:jdbc:mysql://localhost:3306/job_portal}}
spring.datasource.username=${DATABASE_USERNAME:${MYSQL_USER:root}}
spring.datasource.password=${DATABASE_PASSWORD:${MYSQL_PASSWORD:root123}}

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}

# PostgreSQL on Render (detected automatically from DATABASE_URL)
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.MySQLDialect}

